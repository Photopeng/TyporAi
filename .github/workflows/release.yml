name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  platform-build:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
          - platform: macos-arm64
            runner: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unified release quality gate
        run: npm run check:release
      - name: Build portable Renderer and Sidecar
        run: npm run build:release && npm run verify:sidecar
      - name: Package platform release
        run: npm run package:release -- --platform ${{ matrix.platform }}
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TyporAi-${{ matrix.platform }}
          path: dist/TyporAi-${{ matrix.platform }}

  release:
    needs: platform-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release archives
        run: |
          for platform in windows-x64 macos-arm64; do
            directory="dist/TyporAi-${platform}"
            test -f "$directory/release-manifest.json"
            zip -r "TyporAi-${platform}-${GITHUB_REF_NAME}.zip" "$directory"
            cp "$directory/release-manifest.json" "release-manifest-${platform}.json"
            cp "$directory/SHA256SUMS.txt" "SHA256SUMS-${platform}.txt"
          done

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            TyporAi-*-v*.zip
            release-manifest-*.json
            SHA256SUMS-*.txt

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            CHANGELOG=$(git log ${{ steps.prev_tag.outputs.tag }}..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- ${{ github.ref_name }}$" || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          # Handle multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.notes }}
          files: |
            TyporAi-*-v*.zip
            release-manifest-*.json
            SHA256SUMS-*.txt
