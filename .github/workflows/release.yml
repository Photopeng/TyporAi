name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  platform-build:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
          - platform: macos-x64
            runner: macos-13
          - platform: macos-arm64
            runner: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck and lint
        run: npm run typecheck && npm run lint
      - name: Test Sidecar protocol and contracts
        run: npm run test:protocol && npm run test:contract && npm run test:integration
      - name: Build portable Renderer and Sidecar
        run: npm run build:renderer && npm run build:sidecar-v1 && npm run audit:renderer && npm run verify:sidecar
      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TyporAi-${{ matrix.platform }}
          path: |
            typora-typorai.renderer.js
            typorai-sidecar-v1.cjs
            manifest.json
            styles.css

  release:
    needs: platform-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Verify release version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Package release archive
        run: zip -j "TyporAi-${GITHUB_REF_NAME}.zip" typora-typorai.renderer.js typora-typorai.js typorai-sidecar-v1.cjs styles.css manifest.json

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            typora-typorai.renderer.js
            typora-typorai.js
            typorai-sidecar-v1.cjs
            manifest.json
            styles.css
            TyporAi-${{ github.ref_name }}.zip

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            CHANGELOG=$(git log ${{ steps.prev_tag.outputs.tag }}..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- ${{ github.ref_name }}$" || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          # Handle multiline output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.notes }}
          files: |
            TyporAi-${{ github.ref_name }}.zip
            typora-typorai.renderer.js
            typora-typorai.js
            typorai-sidecar-v1.cjs
            manifest.json
            styles.css
